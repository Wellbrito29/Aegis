name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Syntax check
        run: |
          node --check bin/aegis.js
          for f in $(find lib -name "*.js"); do node --check "$f"; done
      - name: Run unit tests
        run: npm test
      - name: Lockfile sanity
        run: |
          # package.json version vs package-lock.json root version
          PKG_VER=$(node -p "require('./package.json').version")
          LOCK_VER=$(node -p "require('./package-lock.json').version")
          if [ "$PKG_VER" != "$LOCK_VER" ]; then
            echo "warn: package.json ($PKG_VER) ≠ package-lock.json ($LOCK_VER)"
          fi
